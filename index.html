<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colabore com a Igreja São Pio</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(#f5e6c8, #fff);
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 520px;
    width: 100%;
  }

  img {
    width: 100%;
    display: block;
  }

  /* BOTÕES */
  .fab {
    position: fixed;
    right: 50px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    color: white;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .fab:hover {
    transform: scale(1.05);
  }

  .fab svg {
    width: 16px;
    height: 16px;
    fill: white;
  }

  .copiar {
    bottom: 260px;
    background: #382304;
  }

  .compartilhar {
    bottom: 220px;
    background: #25D366;
  }

  /* MENSAGEM */
  .mensagem {
    position: fixed;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    font-weight: bold;
    opacity: 0;
    transition: 0.3s;
  }

  .mensagem.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div class="container">
  <img src="sua-imagem.jpg">
</div>

<!-- BOTÃO COPIAR -->
<button class="fab copiar" onclick="copiarPix()">
  <!-- ÍCONE COPY -->
  <svg viewBox="0 0 24 24">
    <path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/>
  </svg>
  COPIAR PIX
</button>

<!-- BOTÃO COMPARTILHAR -->
<button class="fab compartilhar" onclick="compartilhar()">
  <!-- ÍCONE SHARE -->
  <svg viewBox="0 0 24 24">
    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a2.5 2.5 0 0 0 0-1.39l7-4.11A2.99 2.99 0 1 0 14 5a2.9 2.9 0 0 0 .06.59l-7 4.11a3 3 0 1 0 0 4.6l7.05 4.14c-.04.2-.07.41-.07.63a3 3 0 1 0 3-2.99z"/>
  </svg>
  COMPARTILHAR
</button>

<!-- MENSAGEM -->
<div id="mensagem" class="mensagem">
  PIX COPIADO!
</div>

<script>
const chavePix = `00020126470014br.gov.bcb.pix0125pepio.floresta2@gmail.com5204000053039865802BR5919DIOCESE_DE_CRICIUMA6008Criciuma610988805-61062160512Igrejasaopio63040328`;

function copiarPix() {
  navigator.clipboard.writeText(chavePix).then(() => {
    const msg = document.getElementById("mensagem");
    msg.classList.add("show");

    setTimeout(() => {
      msg.classList.remove("show");
    }, 2000);
  });
}

function compartilhar() {
  const url = window.location.href;
  const texto = "Colabore com a construção da Igreja São Pio 🙏";

  if (navigator.share) {
    navigator.share({
      title: 'Colabore com a Igreja São Pio',
      text: texto,
      url: url
    });
  } else {
    // fallback WhatsApp com link
    const mensagem = encodeURIComponent(texto + "\n\n" + url);
    window.open(`https://wa.me/?text=${mensagem}`, "_blank");
  }
}
</script>

</body>
</html>
